onlyBuiltDependencies:
  - edgedriver
  - esbuild
  - geckodriver
  - msw
  - protobufjs

overrides:
  'diff@^7': '^8.0.3'
  'serialize-javascript@^6': '^7.0.5'
  'protobufjs@^7': '^7.6.0'
  'ws@^8': '^8.20.1'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'

  - 'engine.io-client' # Temporary. Remove after 2026-05-23
  - 'protobufjs' # Temporary. Remove after 2026-05-23
  - '@protobufjs/inquire' # Temporary. Remove after 2026-05-23

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
